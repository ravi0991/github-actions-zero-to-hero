# This is workflow name
name: Hello

# runs on a trigger
on:
  push:
    branches: [main]

# these are jobs inside the workflow
jobs:

  # this is the name of the job
  greet:
    # this is github-runner, each job runs on a runner
    runs-on: ubuntu-latest
    steps: 
      - name: say hello to users
        run: echo "Hello Dosto"  

      - name: say hello to username
        run: echo "Hello $USER"
        
   show-version:
    # this is github-runner, each job runs on a runner
     runs-on: ubuntu-latest
     steps: 
      - name: show python version
        run: python3 --version

      - name: show git version
        run: git --version
