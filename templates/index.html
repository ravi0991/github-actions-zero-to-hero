<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>DevOps Zero To Hero</title>
<style>
body{
  font-family: Arial, sans-serif;
  background:#0f0c29;
  color:#fff;
  display:flex;
  align-items:center;
  justify-content:center;
  height:100vh;
  text-align:center;
}
.card{margin:10px;padding:12px;border:1px solid #555;border-radius:8px}
.badge{margin:10px 0;padding:4px 12px;border:1px solid #7b2ff7;border-radius:20px;display:inline-block}
.status span{display:inline-block;margin:6px;padding:6px 10px;border-radius:6px;background:#1f2937}
</style>
</head>

<body>
<div>
  <h1>DevOps Zero To Hero</h1>
  <div class="badge">Josh Batch 10 (USA Edition)</div>

  <div class="card">Framework: Flask 3.1</div>
  <div class="card">Runtime: Python 3.14</div>
  <div class="card">Deploy: AWS ECS</div>

  <h3>CI/CD Pipeline</h3>
  <div class="status">
    <span>Build ✔</span>
    <span>Lint Test ✔</span>
    <span>Deploy ✔</span>
  </div>

  <p>Powered by GitHub Actions 🚀</p>
</div>
</body>
</html>
